<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoTroubleTravel | 旅行しおりメーカー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="glow"></div>
    <header class="hero wrap">
      <p class="brand">NoTroubleTravel</p>
      <div class="day-io-all">
        <button type="button" id="export-all-days" class="ghost tiny" aria-label="全日ルート書き出し" title="全日ルート書き出し">ALL↑</button>
        <button type="button" id="import-all-days" class="ghost tiny" aria-label="全日ルート読み込み" title="全日ルート読み込み">ALL↓</button>
        <input type="file" id="import-all-days-file" class="hidden" accept="application/json,.json" />
      </div>
    </header>

    <main class="wrap stack">
      <div id="day-sections" class="stack">
      <section class="card">
        <div class="section-head day-card-head">
          <div class="day-title">
            <button type="button" class="ghost tiny day-accordion-toggle icon-btn" aria-label="DAY開閉" title="DAY開閉">▼</button>
            <h2>DAY1</h2>
          </div>
          <div class="day-route-actions">
            <button type="button" class="ghost tiny" data-open-day-full-route>GoogleMap</button>
            <button type="button" class="ghost tiny" data-open-day-full-route-yahoo>Yahooカーナビ</button>
          </div>
          <div class="input-tools day-actions">
            <button type="button" id="add-route-point" class="day-card-add icon-btn" aria-label="DAY追加" title="DAY追加">＋</button>
            <button type="button" id="delete-route-day" class="ghost tiny day-card-delete icon-btn" aria-label="削除" title="削除">✕</button>
          </div>
        </div>
        <div class="section-head">
        </div>
        <div class="section-block">
          <div class="section-head">
            <div class="origin-head-row">
              <div class="origin-title">
                <button type="button" class="ghost tiny icon-btn" data-section-toggle aria-label="出発地開閉" title="出発地開閉">▶</button>
                <h3>START</h3>
              </div>
              <input type="text" id="origin" list="origin-history" placeholder="デフォルトで設定した出発地名" required />
            </div>
          </div>
          <div class="section-body hidden">
            <form id="transport-form"></form>
            <div class="origin-action-row">
              <button type="button" id="origin-history-btn" data-day-role="origin-history-btn">履歴から</button>
              <button type="button" id="origin-history-edit-btn" data-day-role="origin-history-edit-btn" class="origin-edit-btn" aria-label="履歴編集">☰</button>
              <button type="button" id="use-current-location" class="origin-current-btn">現在地から</button>
            </div>
            <div id="origin-history-dropdown" data-day-role="origin-history-dropdown" class="route-history-dropdown hidden"></div>
            <div id="origin-inline-editor" class="origin-inline-editor hidden">
              <div id="origin-inline-list" class="origin-inline-list">
                <div class="origin-inline-item origin-inline-default-row" data-origin-index="0" draggable="true">
                  <label class="origin-inline-check-wrap">
                    <input type="checkbox" data-origin-inline-check="0" />
                  </label>
                  <input type="text" id="default-origin-input" data-origin-inline-default-input readonly placeholder="デフォルトで設定した出発地名" />
                  <button type="button" id="save-default-origin" class="origin-default-btn">DEFAULT</button>
                </div>
                <div id="origin-inline-history-list" class="origin-inline-history-list"></div>
              </div>
              <div class="origin-inline-divider"></div>
              <div class="origin-inline-actions">
                <button type="button" id="origin-inline-select-all" class="ghost">すべてをチェック</button>
                <button type="button" id="origin-inline-delete-selected">チェックしたものを削除</button>
              </div>
            </div>
            <datalist id="origin-history"></datalist>
          </div>
        </div>

        <div id="route-list" class="route-list-plain muted">出発地と経由地を登録してください。</div>

        <div class="section-block">
          <div class="section-head">
            <div class="goal-head-row">
              <div class="goal-title">
                <button type="button" class="ghost tiny icon-btn" data-section-toggle aria-label="目的地開閉" title="目的地開閉">▶</button>
                <h3>GOAL</h3>
              </div>
              <input type="text" id="destination-input" data-day-role="destination-input" placeholder="GOALに設定された場所名" />
            </div>
          </div>
          <div class="section-body hidden">
            <form id="hotel-register-form" class="goal-action-row">
              <button type="button" id="destination-history-btn" data-day-role="destination-history-btn">履歴から</button>
              <button type="button" id="destination-history-edit-btn" data-day-role="destination-history-edit-btn" class="origin-edit-btn" aria-label="履歴編集">☰</button>
              <input type="url" id="hotelUrl" data-day-role="hotel-url-input" placeholder="宿泊地 URL" required />
              <button type="submit" class="goal-register-btn">登録</button>
            </form>
            <div id="destination-history-dropdown" data-day-role="destination-history-dropdown" class="route-history-dropdown hidden"></div>

            <div class="hotel-select-head">
              <h4>宿泊地選択</h4>
              <select id="hotel-sort">
                <option value="price-asc">料金が安い順</option>
                <option value="price-desc">料金が高い順</option>
              </select>
            </div>
            <div id="hotel-results" data-day-role="hotel-results" class="hotel-choice-list"></div>
          </div>
        </div>
      </section>
      </div>
    </main>

    <p id="status" class="status wrap"></p>

    <div id="history-editor-modal" class="history-modal hidden" aria-hidden="true">
      <div class="history-modal-panel">
        <div class="history-modal-head">
          <h3>履歴編集</h3>
          <button type="button" id="history-editor-close" class="ghost tiny">閉じる</button>
        </div>
        <div class="history-modal-actions">
          <button type="button" id="history-select-all" class="ghost tiny">全てにチェック</button>
          <button type="button" id="history-delete-selected" class="ghost tiny">チェック項目を削除</button>
        </div>
        <div id="history-editor-list" class="history-editor-list"></div>
      </div>
    </div>

    <div id="export-choice-modal" class="history-modal hidden" aria-hidden="true">
      <div class="history-modal-panel">
        <div class="history-modal-head">
          <h3>送信方法を選択</h3>
          <button type="button" id="export-choice-close" class="ghost tiny">閉じる</button>
        </div>
        <div class="history-modal-actions">
          <button type="button" id="export-choice-download" class="ghost tiny">ダウンロード</button>
          <button type="button" id="export-choice-airdrop" class="ghost tiny">AirDrop</button>
          <button type="button" id="export-choice-line" class="ghost tiny">LINE</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
